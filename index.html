<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doppler Radar Weather Sandbox</title>
  <style>
    :root { --ui-bg: rgba(12,18,28,.82); --ui-border: rgba(180,210,255,.25); --ui-text:#e7f0ff; --ui-muted:#9fb3d1; }
    html,body{margin:0;width:100%;height:100%;background:#070b12;overflow:hidden;font-family:Inter,Segoe UI,Arial,sans-serif;color:var(--ui-text)}
    #app{position:relative;width:100%;height:100%} canvas{position:absolute;inset:0;width:100%;height:100%;display:block;image-rendering:pixelated}
    .toolbar{position:absolute;left:50%;bottom:12px;transform:translateX(-50%);width:min(1240px,calc(100% - 20px));padding:10px;border:1px solid var(--ui-border);border-radius:12px;background:var(--ui-bg);display:flex;gap:8px;flex-wrap:wrap;z-index:10}
    button{border:1px solid var(--ui-border);background:rgba(18,30,46,.95);color:var(--ui-text);padding:7px 9px;border-radius:8px;font-size:12px;cursor:pointer}
    button.active{border-color:rgba(120,220,255,.95);box-shadow:inset 0 0 0 1px rgba(120,220,255,.35)} .pill{padding:6px 10px;font-size:12px;color:#b9d8ff}
  </style>
</head>
<body><div id="app"><canvas id="radar"></canvas><div class="toolbar" id="toolbar"></div></div>
<script>
const canvas = document.getElementById('radar'), ctx = canvas.getContext('2d'), toolbar = document.getElementById('toolbar');
const mapImage = new Image(); mapImage.crossOrigin='anonymous'; mapImage.src='https://upload.wikimedia.org/wikipedia/commons/8/80/Equirectangular-projection.jpg';
const TOOLS=['high_pressure','low_pressure','moisture','temperature','wind_shear','cold_front','warm_front','dryline','supercell'];
const TOOL_LABEL={high_pressure:'High Pressure',low_pressure:'Low Pressure',moisture:'Moisture',temperature:'Temperature',wind_shear:'Wind Shear',cold_front:'Cold Front',warm_front:'Warm Front',dryline:'Dryline',supercell:'Supercell'};
const sim={cellSize:3,cols:0,rows:0,field:null,next:null,rotationField:null,rotationNext:null,pressureField:null,temperatureField:null,humidityField:null,shearField:null,windXField:null,windYField:null,jetStreamX:null,threshold:0.08,time:0,frame:0,tool:'low_pressure'};
let mouseDown=false, mouseX=0, mouseY=0;
const idx=(x,y)=>y*sim.cols+x, sample=(f,x,y)=>(x<0||y<0||x>=sim.cols||y>=sim.rows)?0:f[idx(x,y)];
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function noise(x,y,t=0){const v=Math.sin(x*12.9898+y*78.233+t*3.71)*43758.5453;return v-Math.floor(v);}
function buildToolbar(){
  toolbar.innerHTML=''; TOOLS.forEach(t=>{const b=document.createElement('button');b.textContent=TOOL_LABEL[t];b.onclick=()=>setTool(t);b.id='tool_'+t;toolbar.appendChild(b)});
  const s=document.createElement('span');s.className='pill';s.id='status';s.textContent='Tool: LOW PRESSURE';toolbar.appendChild(s); setTool(sim.tool);
}
function setTool(t){sim.tool=t; TOOLS.forEach(k=>document.getElementById('tool_'+k)?.classList.toggle('active',k===t)); document.getElementById('status').textContent='Tool: '+TOOL_LABEL[t].toUpperCase();}
function initFields(){
  const n=sim.cols*sim.rows; sim.field=new Float32Array(n); sim.next=new Float32Array(n); sim.rotationField=new Float32Array(n); sim.rotationNext=new Float32Array(n);
  sim.pressureField=new Float32Array(n); sim.temperatureField=new Float32Array(n); sim.humidityField=new Float32Array(n); sim.shearField=new Float32Array(n); sim.windXField=new Float32Array(n); sim.windYField=new Float32Array(n); sim.jetStreamX=new Float32Array(sim.rows);
  for(let i=0;i<n;i++){sim.pressureField[i]=0.5; sim.temperatureField[i]=0.5; sim.humidityField[i]=0.5; sim.shearField[i]=0.3;}
  for(let y=0;y<sim.rows;y++){ sim.jetStreamX[y]=Math.sin(y*0.01)*1.5; }
}
function resize(){canvas.width=innerWidth; canvas.height=innerHeight; sim.cols=Math.ceil(canvas.width/sim.cellSize); sim.rows=Math.ceil(canvas.height/sim.cellSize); initFields();}
function applyBrush(gx,gy,r,fn){for(let y=gy-r;y<=gy+r;y++)for(let x=gx-r;x<=gx+r;x++){if(x<0||y<0||x>=sim.cols||y>=sim.rows)continue; const d2=(x-gx)**2+(y-gy)**2;if(d2>r*r)continue; fn(idx(x,y),1-d2/(r*r),x,y);}}
function applyFront(gx,gy,type){const ang=Math.PI*0.18, len=70, width=8; for(let i=-len;i<=len;i++)for(let w=-width;w<=width;w++){const x=Math.floor(gx+i*Math.cos(ang)-w*Math.sin(ang)), y=Math.floor(gy+i*Math.sin(ang)+w*Math.cos(ang)); if(x<0||y<0||x>=sim.cols||y>=sim.rows)continue; const id=idx(x,y), t=Math.abs(w)/width;
  if(type==='cold_front'){sim.temperatureField[id]=clamp(sim.temperatureField[id]-0.22*(1-t),0,1); sim.humidityField[id]=clamp(sim.humidityField[id]+0.10*(1-t),0,1); sim.pressureField[id]=clamp(sim.pressureField[id]-0.06*(1-t),0,1);} 
  if(type==='warm_front'){sim.temperatureField[id]=clamp(sim.temperatureField[id]+0.15*(1-t),0,1); sim.humidityField[id]=clamp(sim.humidityField[id]+0.07*(1-t),0,1);}
  if(type==='dryline'){sim.humidityField[id]=clamp(sim.humidityField[id]-(i>0?0.2:-0.02)*(1-t),0,1); sim.temperatureField[id]=clamp(sim.temperatureField[id]+0.12*(1-t),0,1); sim.shearField[id]=clamp(sim.shearField[id]+0.25*(1-t),0,1); sim.pressureField[id]=clamp(sim.pressureField[id]-0.07*(1-t),0,1);} }}
function injectTool(px,py){const gx=Math.floor(px/sim.cellSize), gy=Math.floor(py/sim.cellSize), r=7;
 if(sim.tool==='cold_front'||sim.tool==='warm_front'||sim.tool==='dryline') return applyFront(gx,gy,sim.tool);
 if(sim.tool==='supercell'){applyBrush(gx,gy,10,(id,f)=>{sim.humidityField[id]=clamp(sim.humidityField[id]+0.38*f,0,1);sim.temperatureField[id]=clamp(sim.temperatureField[id]+0.33*f,0,1);sim.shearField[id]=clamp(sim.shearField[id]+0.45*f,0,1);sim.pressureField[id]=clamp(sim.pressureField[id]-0.28*f,0,1); sim.rotationField[id]=clamp(sim.rotationField[id]+0.42*f,0,1);}); return;}
 applyBrush(gx,gy,r,(id,f)=>{if(sim.tool==='high_pressure')sim.pressureField[id]=clamp(sim.pressureField[id]+0.22*f,0,1);
  if(sim.tool==='low_pressure')sim.pressureField[id]=clamp(sim.pressureField[id]-0.22*f,0,1);
  if(sim.tool==='moisture')sim.humidityField[id]=clamp(sim.humidityField[id]+0.26*f,0,1);
  if(sim.tool==='temperature')sim.temperatureField[id]=clamp(sim.temperatureField[id]+0.24*f,0,1);
  if(sim.tool==='wind_shear')sim.shearField[id]=clamp(sim.shearField[id]+0.22*f,0,1);});
}
function updateField(){
  const WIND_STRENGTH=0.5, WIND_CLAMP=1.6, SHEAR_STRENGTH=0.12;
  for(let y=0;y<sim.rows;y++)for(let x=0;x<sim.cols;x++){
    const id=idx(x,y);
    const dPx=sample(sim.pressureField,x+1,y)-sample(sim.pressureField,x-1,y);
    const dPy=sample(sim.pressureField,x,y+1)-sample(sim.pressureField,x,y-1);
    const shearX=(noise(x*0.11,y*0.11,sim.time*0.01)-0.5)*SHEAR_STRENGTH;
    const shearY=(noise(x*0.11+19,y*0.11+31,sim.time*0.01)-0.5)*SHEAR_STRENGTH;
    let wx=sim.jetStreamX[y] + (-dPx*WIND_STRENGTH) + shearX, wy=(-dPy*WIND_STRENGTH) + shearY;
    const mag=Math.hypot(wx,wy);
    if(mag>WIND_CLAMP){const k=WIND_CLAMP/mag; wx*=k; wy*=k;}
    sim.windXField[id]=wx; sim.windYField[id]=wy;
  }
  for(let y=1;y<sim.rows-1;y++)for(let x=1;x<sim.cols-1;x++){
    const id=idx(x,y);
    sim.windXField[id]=(sim.windXField[id]+sim.windXField[idx(x-1,y)]+sim.windXField[idx(x+1,y)]+sim.windXField[idx(x,y-1)]+sim.windXField[idx(x,y+1)])*0.2;
    sim.windYField[id]=(sim.windYField[id]+sim.windYField[idx(x-1,y)]+sim.windYField[idx(x+1,y)]+sim.windYField[idx(x,y-1)]+sim.windYField[idx(x,y+1)])*0.2;
  }

  for(let y=0;y<sim.rows;y++)for(let x=0;x<sim.cols;x++){
    const id=idx(x,y), h=sim.humidityField[id], t=sim.temperatureField[id], sh=sim.shearField[id], rot=sim.rotationField[id];
    const wx=sim.windXField[id], wy=sim.windYField[id];
    const n=sample(sim.field,x,y-1),s=sample(sim.field,x,y+1),e=sample(sim.field,x+1,y),w=sample(sim.field,x-1,y),avg=(n+s+e+w)*0.25;
    const ax=x-wx, ay=y-wy, fx=Math.floor(ax), fy=Math.floor(ay), tx=ax-fx, ty=ay-fy;
    const a00=sample(sim.field,fx,fy),a10=sample(sim.field,fx+1,fy),a01=sample(sim.field,fx,fy+1),a11=sample(sim.field,fx+1,fy+1);
    const adv=(a00*(1-tx)+a10*tx)*(1-ty)+(a01*(1-tx)+a11*tx)*ty;

    const div=(sample(sim.windXField,x+1,y)-sample(sim.windXField,x-1,y))+(sample(sim.windYField,x,y+1)-sample(sim.windYField,x,y-1));
    const convergence=Math.max(0,-div*0.5), divergence=Math.max(0,div*0.5);
    const mainAdv=adv;
    const nbrAdv=sample(sim.field, Math.round(ax + Math.sign(wx||1)), Math.round(ay + Math.sign(wy||1)));
    const advMix=mainAdv*0.7 + nbrAdv*0.3;
    let val=sim.field[id]*0.08+avg*0.22+advMix*0.70;
    const instability=h*t;
    const growth=convergence*instability;
    if(growth>0.02) val+=growth*0.08;
    val-=divergence*(0.05+0.04*(1-h));
    // simple stable convergence support
    if(convergence>0.08 && h>0.55) val*=1.05;
    else val*=0.97;
    val += Math.max(0,rot)*Math.max(0,sh-0.45)*0.01;
    val += (val*val)*(0.006+growth*0.018);
    val*=0.94;
    if(h<0.35 || divergence>0.10) val*=0.85;
    if(Math.abs(sim.field[id]-avg)>0.08 && Math.random()<0.13) val*=0.84;
    if(val<0.28 && Math.random()<0.03) val*=0.05;
    val += (Math.random()*2-1)*0.008;

    if(rot>0.72 && sample(sim.pressureField,x,y)<0.35 && h>0.7 && sh>0.65 && sim.field[id]>0.65){ val = clamp(val+0.06,0,1); sim.rotationNext[id]=clamp(rot+0.05,0,1); }
    else sim.rotationNext[id]=clamp((rot*0.986 + sh*0.0025) + (Math.random()*2-1)*0.0012,0,1);
    sim.next[id]=clamp(val,0,1);
  }
  const tmp=sim.field; sim.field=sim.next; sim.next=tmp; const rt=sim.rotationField; sim.rotationField=sim.rotationNext; sim.rotationNext=rt; sim.time++;
}
function colorFor(v){if(v<sim.threshold)return null; const j=0.9+Math.random()*0.18; if(v<0.35)return `rgba(46,205,103,${Math.min(0.8,(0.22+v*1.28)*j).toFixed(3)})`; if(v<0.65)return `rgba(242,226,75,${Math.min(0.86,(0.38+(v-0.35)*1.5)*j).toFixed(3)})`; return `rgba(231,57,57,${Math.min(0.94,(0.56+(v-0.65)*1.7)*j).toFixed(3)})`;}
function drawMap(){if(mapImage.complete&&mapImage.naturalWidth>0){ctx.globalAlpha=.7;ctx.drawImage(mapImage,0,0,canvas.width,canvas.height);ctx.globalAlpha=1;} ctx.fillStyle='rgba(8,16,28,0.24)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.fillStyle='rgba(0,0,0,0.30)';ctx.fillRect(0,0,canvas.width,canvas.height)}
function render(){ctx.clearRect(0,0,canvas.width,canvas.height);drawMap(); const c=sim.cellSize; for(let y=0;y<sim.rows;y++)for(let x=0;x<sim.cols;x++){const v=sim.field[idx(x,y)],col=colorFor(v); if(!col)continue; ctx.fillStyle=col; ctx.fillRect(x*c,y*c,c,c);} ctx.fillStyle='rgba(255,255,255,0.02)';ctx.fillRect(0,0,canvas.width,canvas.height)}
function tick(){sim.frame++; if(mouseDown) injectTool(mouseX, mouseY); if(sim.frame%2===0)updateField(); render(); requestAnimationFrame(tick)}
canvas.addEventListener('mousedown',e=>{mouseDown=true; const r=canvas.getBoundingClientRect(); mouseX=e.clientX-r.left; mouseY=e.clientY-r.top; injectTool(mouseX, mouseY);});
canvas.addEventListener('mouseup',()=>{mouseDown=false;});
canvas.addEventListener('mouseleave',()=>{mouseDown=false;});
canvas.addEventListener('mousemove',e=>{const r=canvas.getBoundingClientRect(); mouseX=e.clientX-r.left; mouseY=e.clientY-r.top;});
addEventListener('resize',resize); buildToolbar(); resize(); tick();
</script></body></html>
